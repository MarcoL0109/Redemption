apiVersion: apps/v1
kind: Deployment
metadata:
  name: redemption-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redemption-backend
  template:
    metadata:
      labels:
        app: redemption-backend
    spec:
      containers:
      - name: backend
        image: redemption-backend:local
        imagePullPolicy: Never
        ports:
        - containerPort: 5500
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: redemption-config
        - secretRef:
            name: redemption-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: redemption-backend-service
spec:
  selector:
    app: redemption-backend
  ports:
    - name: http-api
      protocol: TCP
      port: 5500
      targetPort: 5500
      nodePort: 30500     # ◄── Correct! Permanently locks HTTP API
    - name: websocket
      protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30300     # ◄── Correct! Permanently locks WebSockets
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redemption-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redemption-frontend
  template:
    metadata:
      labels:
        app: redemption-frontend
    spec:
      containers:
      - name: frontend
        image: redemption-frontend:local
        imagePullPolicy: Never
        ports:
        - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: redemption-frontend-service
spec:
  selector:
    app: redemption-frontend
  ports:
    - protocol: TCP
      port: 5173
      targetPort: 5173
      nodePort: 30173
  type: NodePort