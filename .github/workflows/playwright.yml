name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # 💡 STEP 1: Spin up ONLY your database and backend API containers.
    # Leave the frontend out of this command so port 5173 stays completely free.
    # Adjust "database" and "backend" to match your service names in docker-compose.yml
    - name: Start Every Service
      env:
        REACT_APP_DATABASE_PASSWORD: ${{ secrets.REACT_APP_DATABASE_PASSWORD }}
      run: docker compose up -d

    # 💡 STEP 2: Wait for your database to finish initializing before continuing
    - name: Wait for Database Connection
      run: |
        echo "Waiting for database container..."
        until docker exec $(docker ps -q -f name=database) mysqladmin ping -u root -p"${{ secrets.REACT_APP_DATABASE_PASSWORD }}" --silent; do
          sleep 3
        done
        echo "Database is online!"

    # 💡 STEP 3: Run Playwright tests.
    # Playwright's config will see process.env.CI is true, execute 'npm run dev' 
    # right here natively on the runner, and bind perfectly to port 5173.
    - name: Run Playwright tests
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30