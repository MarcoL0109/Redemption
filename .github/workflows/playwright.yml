name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # 💡 STEP 1: Spin up ONLY your database and backend API containers.
    # Leave the frontend out of this command so port 5173 stays completely free.
    # Adjust "database" and "backend" to match your service names in docker-compose.yml
    - name: Start Backend Services
      env:
        REACT_APP_DATABASE_PASSWORD: ${{ secrets.REACT_APP_DATABASE_PASSWORD }}
      run: docker compose up -d database_service redis
    
    - name: Wait for Redis Connection
      run: |
        echo "Waiting for Redis container..."
        # Uses redis-cli ping inside the container until it returns 'PONG'
        until docker exec $(docker ps -q -f name=redis) redis-cli ping | grep -q "PONG"; do
          echo "Redis is booting up... sleeping for 2 seconds"
          sleep 2
        done
        echo "Redis is online!"

    # 4. Now that DB and Redis are 100% ready, spin up your backend application safely
    - name: Start Backend API Service
      run: docker compose up -d backend

    # 💡 STEP 2: Wait for your database to finish initializing before continuing
    - name: Wait for Database Connection
      run: |
        echo "Giving MySQL a moment to create its socket file..."
          sleep 15
        echo "Waiting for database container..."
        until docker exec $(docker ps -q -f name=database_service) mysqladmin ping -u root -p"${{ secrets.REACT_APP_DATABASE_PASSWORD }}" --silent; do
          sleep 3
        done
        echo "Database is online!"
    
    - name: Seed Database from Self-Contained Backup
      run: |
        echo "Injecting self-contained backup SQL script..."
        docker exec -i $(docker ps -q -f name=database_service) mysql -u root -p"${{ secrets.REACT_APP_DATABASE_PASSWORD }}" redemption_db < ./init-db/sample_data.sql
        echo "Backup database schema and data deployed!"

        echo "----------------------------------------"
        echo "Verifying injected tables in redemption_db:"
        echo "----------------------------------------"
        docker exec $(docker ps -q -f name=database_service) mysql -u root -p"${{ secrets.REACT_APP_DATABASE_PASSWORD }}" redemption_db -e "SHOW TABLES;"

    # 💡 STEP 3: Run Playwright tests.
    # Playwright's config will see process.env.CI is true, execute 'npm run dev' 
    # right here natively on the runner, and bind perfectly to port 5173.
    - name: Run Playwright tests
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30