name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # STEP 1: Spin up ONLY your database and backend API containers.
    - name: Start Database Services
      env:
        REACT_APP_DATABASE_PASSWORD: ${{ secrets.REACT_APP_DATABASE_PASSWORD }}
      run: docker compose up -d database-service redis
    
    # STEP 2: Ensure Redis runs before the backend service run
    - name: Wait for Redis Connection
      run: |
        echo "Waiting for Redis container..."
        # Uses redis-cli ping inside the container until it returns 'PONG'
        until docker exec $(docker ps -q -f name=redis) redis-cli ping | grep -q "PONG"; do
          echo "Redis is booting up... sleeping for 2 seconds"
          sleep 2
        done
        echo "Redis is online!"

    # STEP 3: Start the Backend API Service
    - name: Start Backend API Service
      run: docker compose up -d redemption-backend-service
      env:
        SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        REACT_APP_DATABASE_PASSWORD: ${{ secrets.REACT_APP_DATABASE_PASSWORD || 'root_test_pass' }}

    # STEP 4: Ensure the MySQL Database websocket is established before starting anything
    - name: Wait for Database Connection
      run: |
        echo "Giving MySQL a moment to create its socket file..."
          sleep 15
        echo "Waiting for database container..."
        until docker exec $(docker ps -q -f name=database-service) mysqladmin ping -u root -p"${{ secrets.REACT_APP_DATABASE_PASSWORD }}" --silent; do
          sleep 3
        done
        echo "Database is online!"
    
    # STEP 5: Load and run the SQL script to create smaple data to the database service
    - name: Seed Database from Self-Contained Backup
      run: |
        echo "Injecting self-contained backup SQL script..."
        docker exec -i $(docker ps -q -f name=database-service) mysql -u root -p"${{ secrets.REACT_APP_DATABASE_PASSWORD }}" redemption_db < ./init-db/sample_data.sql
        echo "Backup database schema and data deployed!"

        echo "----------------------------------------"
        echo "Verifying injected tables in redemption_db:"
        echo "----------------------------------------"
        docker exec $(docker ps -q -f name=database-service) mysql -u root -p"${{ secrets.REACT_APP_DATABASE_PASSWORD }}" redemption_db -e "SHOW TABLES;"
      
    # STEP 6: Run Playwright tests
    - name: Run Playwright tests
      run: npx playwright test

    # STEP 7: Upload the trace files, screenshots and network states into an upload link for download in inspect when failed
    - name: Upload Playwright Report Artifact
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    
    # STEP 8: Log out all the docker log if the tests failed for inspecting errors
    - name: Inspect Docker Container Logs on Failure
      if: failure()  
      run: |
        echo "=========================================================="
        echo "🐳 PRINTING ALL DOCKER CONTAINER LOGS 🐳"
        echo "=========================================================="
        docker compose logs
    