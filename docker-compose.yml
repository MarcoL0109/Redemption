services:
  # 1. Frontend
  frontend:
    build:
      context: .
      dockerfile: Docker/frontend.dev.dockerfile
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/Frontend/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0

  # 2. Backend Service
  redemption-backend-service:
    build:
      context: .
      dockerfile: Docker/backend.dev.dockerfile
    ports:
      - "5500:5500"
      - "3000:3000"
    environment:
      - REDIS_HOST=redis
      - NODE_ENV=development
      - REACT_APP_DATABASE_HOST=database-service
      - REACT_APP_DATABASE_USER=root 
      - REACT_APP_DATABASE_PASSWORD=${REACT_APP_DATABASE_PASSWORD:-root_test_pass}
      - REACT_APP_DATABASE_NAME=redemption_db
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/Backend/node_modules
    depends_on:
      database-service:
        condition: service_started
      # ─── FORCE BACKEND TO WAIT UNTIL REDIS IS TRULY HEALTHY ───
      redis:
        condition: service_healthy 

  # 3. Redis Service
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    # ─── ADD HEALTHCHECK TO VERIFY REDIS IS ACCEPTING PINGS ───
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 4. The Isolated MySQL Database Container
  database-service:
    image: "mysql:8.0"
    ports:
      - "3307:3306" # Since you mapped this to 3307 locally, make sure your local Workbench connects to 3307!
    environment:
      - MYSQL_ROOT_PASSWORD=${REACT_APP_DATABASE_PASSWORD:-root_test_pass}
      - MYSQL_DATABASE=redemption_db
    volumes:
      - db_data:/var/lib/mysql
      - ./init-db/sample_data.sql:/docker-entrypoint-initdb.d/sample_data.sql

volumes:
  db_data: